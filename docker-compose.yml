version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: altesdigital-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: altesdigital
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: altesdigital-redis
    ports:
      - "6379:6379"

  backend:
    build: maquettes/backend
    container_name: altesdigital-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/altesdigital
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: altesdigital-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
